<!--surface
name: inbox
caps: mail.query, mail.archive, mail.snooze
intent: Vendor reference surface - a classic inbox list.
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--page);
    color: var(--ink);
    padding: 20px;
    font-size: 14px;
  }
  h1 { font-size: 17px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 12.5px; margin-bottom: 16px; }
  .thread {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .thread.awaiting { border-left: 3px solid var(--violet); }
  .who { font-weight: 500; width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .what { flex: 1; min-width: 0; }
  .subject { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .snippet { color: var(--muted); font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .when { color: var(--muted); font-size: 11.5px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .actions { display: flex; gap: 6px; flex-shrink: 0; }
  button {
    font-family: var(--font);
    font-size: 12px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    border-radius: 999px;
    padding: 5px 12px;
    cursor: pointer;
  }
  button:hover { border-color: var(--violet); }
  .empty { color: var(--muted); padding: 32px; text-align: center; }
</style>
<h1>Inbox</h1>
<div class="sub" id="count"></div>
<div id="list"></div>
<script>
  async function render() {
    const threads = await facet.cap('mail.query', { filter: 'inbox' });
    const list = document.getElementById('list');
    document.getElementById('count').textContent = threads.length + ' threads';
    if (!threads.length) { list.innerHTML = '<div class="empty">Inbox zero 🎉</div>'; return; }
    list.innerHTML = '';
    for (const t of threads) {
      const el = document.createElement('div');
      el.className = 'thread' + (t.awaitingReply ? ' awaiting' : '');
      el.innerHTML =
        '<div class="who"></div>' +
        '<div class="what"><div class="subject"></div><div class="snippet"></div></div>' +
        '<div class="when"></div>' +
        '<div class="actions"><button data-act="snooze">Snooze</button><button data-act="archive">Archive</button></div>';
      el.querySelector('.who').textContent = t.sender;
      el.querySelector('.subject').textContent = t.subject;
      el.querySelector('.snippet').textContent = t.snippet;
      el.querySelector('.when').textContent = facet.timeAgo(t.receivedAt);
      el.querySelector('[data-act=archive]').onclick = async () => {
        await facet.cap('mail.archive', { threadId: t.id }); render();
      };
      el.querySelector('[data-act=snooze]').onclick = async () => {
        const until = new Date(Date.now() + 24 * 3600 * 1000).toISOString();
        await facet.cap('mail.snooze', { threadId: t.id, until }); render();
      };
      list.appendChild(el);
    }
  }
  render();
</script>
